<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" fill="none">
  <!-- Water background -->
  <rect width="600" height="480" fill="#e8eff5"/>

  <!-- Pasco County -->
  <path d="M140 20 L460 20 L460 155 L310 155 L290 170 L250 160 L200 165 L140 155 Z" fill="#d6dfe8" stroke="#024B7D" stroke-width="1.2" stroke-opacity="0.3"/>

  <!-- Hillsborough County -->
  <path d="M200 165 L250 160 L290 170 L310 155 L460 155 L460 340 L380 340 L340 380 L300 360 L260 370 L220 340 L180 350 L160 310 L140 280 L140 155 L200 165 Z" fill="#bfcfdc" stroke="#024B7D" stroke-width="1.2" stroke-opacity="0.3"/>

  <!-- Pinellas County (peninsula) -->
  <path d="M60 160 L140 155 L140 280 L160 310 L150 340 L130 380 L110 420 L90 450 L70 440 L55 400 L50 350 L45 300 L48 250 L55 200 L60 160 Z" fill="#a8bccf" stroke="#024B7D" stroke-width="1.2" stroke-opacity="0.3"/>

  <!-- Tampa Bay water body -->
  <path d="M140 280 L160 310 L150 340 L130 380 L140 370 L180 350 L220 340 L260 370 L240 330 L200 300 L170 280 L140 280 Z" fill="#e8eff5" stroke="none"/>

  <!-- Old Tampa Bay water -->
  <path d="M140 155 L200 165 L190 200 L175 230 L160 260 L140 280 L130 240 L125 200 L140 155 Z" fill="#e8eff5" stroke="none"/>

  <!-- County labels -->
  <text x="300" y="95" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#024B7D" text-anchor="middle" letter-spacing="0.12em" opacity="0.5">PASCO</text>
  <text x="340" y="255" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#024B7D" text-anchor="middle" letter-spacing="0.12em" opacity="0.5">HILLSBOROUGH</text>
  <text x="75" y="280" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#024B7D" text-anchor="middle" letter-spacing="0.12em" opacity="0.5">PINELLAS</text>

  <!-- City dots and labels -->

  <!-- Tampa (primary) -->
  <circle cx="250" cy="290" r="6" fill="#024B7D"/>
  <circle cx="250" cy="290" r="10" fill="#024B7D" opacity="0.15"/>
  <text x="265" y="286" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#024B7D">Tampa</text>

  <!-- St. Petersburg -->
  <circle cx="95" cy="370" r="4.5" fill="#024B7D"/>
  <text x="95" y="390" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#024B7D" text-anchor="middle">St. Petersburg</text>

  <!-- Clearwater -->
  <circle cx="75" cy="205" r="4" fill="#024B7D"/>
  <text x="75" y="198" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#024B7D" text-anchor="middle">Clearwater</text>

  <!-- Wesley Chapel -->
  <circle cx="310" cy="75" r="4" fill="#024B7D"/>
  <text x="326" y="79" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#024B7D">Wesley Chapel</text>

  <!-- New Port Richey -->
  <circle cx="145" cy="60" r="3.5" fill="#024B7D"/>
  <text x="161" y="64" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#024B7D">New Port Richey</text>

  <!-- Brandon -->
  <circle cx="340" cy="310" r="3.5" fill="#024B7D"/>
  <text x="356" y="314" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#024B7D">Brandon</text>

  <!-- Largo -->
  <circle cx="80" cy="310" r="3.5" fill="#024B7D"/>
  <text x="80" y="328" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#024B7D" text-anchor="middle">Largo</text>

  <!-- Riverview -->
  <circle cx="300" cy="350" r="3.5" fill="#024B7D"/>
  <text x="316" y="354" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#024B7D">Riverview</text>

  <!-- Land O' Lakes -->
  <circle cx="230" cy="55" r="3.5" fill="#024B7D"/>
  <text x="230" y="48" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#024B7D" text-anchor="middle">Land O' Lakes</text>

  <!-- Dunedin -->
  <circle cx="68" cy="235" r="3" fill="#024B7D"/>
  <text x="48" y="248" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#024B7D" text-anchor="middle">Dunedin</text>

  <!-- Temple Terrace -->
  <circle cx="310" cy="230" r="3" fill="#024B7D"/>
  <text x="326" y="234" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#024B7D">Temple Terrace</text>

  <!-- Plant City -->
  <circle cx="420" cy="280" r="3" fill="#024B7D"/>
  <text x="420" y="296" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#024B7D" text-anchor="middle">Plant City</text>
</svg>
